name = "questerix-workers"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[send_email]]
name = "EMAIL"
# No destination restriction — sends to any verified Email Routing address

[vars]
ENVIRONMENT = "production"
ALERT_SENDER = "alerts@questerix.com"

# Secrets (set via `wrangler secret put`):
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# ALERT_WEBHOOK_SECRET
# ADMIN_ALERT_EMAIL
